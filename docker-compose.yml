services:
  postgres:
    image: postgres:16-alpine
    container_name: pain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pain_user
      POSTGRES_PASSWORD: pain_password
      POSTGRES_DB: pain_db
    ports:
      - "5433:5432"
    volumes:
      - pain_pgdata:/var/lib/postgresql/data

volumes:
  pain_pgdata:
